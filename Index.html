<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Special Surprise for Joy</title>
  <style>
    :root {
      --primary-pink: #ff758c;
      --soft-white: rgba(255, 255, 255, 0.2);
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
      color: white;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.18);
      z-index: 10;
      animation: fadeIn 1.5s ease-out;
    }

    h1 {
      font-size: 3em;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
    }

    p {
      font-size: 1.2em;
      line-height: 1.6;
    }

    .btn-container {
      margin-top: 25px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
    }

    .btn {
      padding: 12px 30px;
      font-size: 1.1em;
      border: none;
      border-radius: 50px;
      background: white;
      color: #ff758c;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
      background: #fff0f3;
    }

    #no-btn {
      position: absolute;
      transition: 0.2s;
    }

    .hidden { display: none; }

    .heart {
      position: fixed;
      top: -10vh;
      font-size: 24px;
      user-select: none;
      z-index: 1;
      animation: fall linear infinite;
    }

    @keyframes fall {
      to { transform: translateY(110vh) rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    #quote-box {
      font-style: italic;
      margin-top: 20px;
      color: #fff;
      min-height: 50px;
    }
  </style>
</head>
<body>

  <div class="glass-card">
    <h1>Hi Joy ✨</h1>
    <p id="main-text">I was thinking about you and decided to build this little corner of the internet just for you.</p>
    
    <div class="btn-container">
      <button class="btn" id="reveal-btn" onclick="revealSurprise()">Unlock the Magic 🔒</button>
      
      <div id="extra-features" class="hidden">
        <p id="quote-box">"You're the kind of person who makes the sun feel jealous."</p>
        <button class="btn" onclick="newQuote()">Another reason why you're great 💖</button>
        <p style="margin-top:20px; font-size: 0.9em;">Are you the coolest person ever?</p>
        <div style="height: 50px;">
            <button class="btn" onclick="alert('I knew it! ❤️')">Yes!</button>
            <button class="btn" id="no-btn" onmouseover="moveNoButton()">No</button>
        </div>
      </div>
    </div>
  </div>

  <audio id="music" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
  </audio>

  <script>
    const quotes = [
      "Your smile is literally my favorite thing. 😊",
      "The world is just better with you in it.",
      "You have a heart of gold, Joy. ✨",
      "You're smarter and funnier than you give yourself credit for.",
      "If being awesome was a crime, you'd be doing life. ⚖️",
      "You're my favorite notification. 📱"
    ];

    function revealSurprise() {
      document.getElementById('reveal-btn').classList.add('hidden');
      document.getElementById('extra-features').classList.remove('hidden');
      document.getElementById('main-text').innerText = "You're truly one of a kind. Here's a little reminder of how special you are:";
      
      // Play music (Note: Browsers require user interaction first)
      const music = document.getElementById('music');
      music.play().catch(() => console.log("Music blocked by browser policy"));
      
      // Start heart rain
      setInterval(createHeart, 300);
    }

    function newQuote() {
      const qBox = document.getElementById('quote-box');
      const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
      qBox.style.opacity = 0;
      setTimeout(() => {
        qBox.innerText = `"${randomQuote}"`;
        qBox.style.opacity = 1;
      }, 300);
    }

    function moveNoButton() {
      const btn = document.getElementById('no-btn');
      const x = Math.random() * (window.innerWidth - btn.offsetWidth);
      const y = Math.random() * (window.innerHeight - btn.offsetHeight);
      btn.style.left = x + 'px';
      btn.style.top = y + 'px';
    }

    function createHeart() {
      const heart = document.createElement('div');
      const emojis = ['💖', '✨', '🌸', '💘', '⭐'];
      heart.classList.add('heart');
      heart.innerText = emojis[Math.floor(Math.random() * emojis.length)];
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
      heart.style.opacity = Math.random();
      document.body.appendChild(heart);

      setTimeout(() => heart.remove(), 5000);
    }
  </script>
</body>
</html>
