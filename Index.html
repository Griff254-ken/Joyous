<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pour Joy | Une Belle Surprise</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --romantic-gold: #d4af37;
      --romantic-blush: #fff5f6;
      --romantic-rose: #e28d9a;
      --deep-velvet: #2c0e12;
      --glass: rgba(255, 255, 255, 0.15);
      --transition-long: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000; /* Fallback */
      background: radial-gradient(circle at center, #4a151b 0%, #1a0507 100%);
      font-family: 'Inter', sans-serif;
      color: var(--romantic-blush);
      overflow: hidden;
    }

    /* --- Background Atmosphere --- */
    .dust-particle {
      position: absolute;
      background: white;
      border-radius: 50%;
      opacity: 0.3;
      pointer-events: none;
      animation: float-dust linear infinite;
    }

    @keyframes float-dust {
      0% { transform: translateY(0) translateX(0); opacity: 0; }
      50% { opacity: 0.4; }
      100% { transform: translateY(-100vh) translateX(20px); opacity: 0; }
    }

    /* --- The Letter Experience --- */
    .envelope {
      position: relative;
      width: 90%;
      max-width: 550px;
      perspective: 1000px;
      z-index: 10;
    }

    .card {
      background: var(--glass);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 2px; /* Elegant sharp edges for a premium feel */
      padding: 4rem 3rem;
      text-align: center;
      box-shadow: 0 40px 100px rgba(0,0,0,0.5);
      transform-style: preserve-3d;
      transition: var(--transition-long);
    }

    .card::before {
      content: "";
      position: absolute;
      top: 10px; left: 10px; right: 10px; bottom: 10px;
      border: 1px solid rgba(212, 175, 55, 0.3); /* Gold inner border */
      pointer-events: none;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      font-weight: 400;
      font-style: italic;
      margin-bottom: 1.5rem;
      background: linear-gradient(to right, #fff, var(--romantic-gold), #fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
    }

    .message {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      line-height: 1.8;
      margin-bottom: 2.5rem;
      opacity: 0.9;
    }

    /* --- Elegant Interaction --- */
    .btn-reveal {
      background: transparent;
      border: 1px solid var(--romantic-gold);
      color: var(--romantic-gold);
      padding: 1rem 2.5rem;
      font-family: 'Inter', sans-serif;
      text-transform: uppercase;
      letter-spacing: 3px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-reveal:hover {
      background: var(--romantic-gold);
      color: var(--deep-velvet);
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
    }

    .heart-icon {
      font-size: 2rem;
      color: var(--romantic-gold);
      margin-bottom: 1rem;
      display: block;
      animation: pulse 3s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }

    /* --- Surprise Elements --- */
    #extraContent {
      display: none;
      animation: fadeIn 2s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .toast {
      position: fixed;
      bottom: 30px;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--romantic-gold);
      opacity: 0;
      transition: opacity 1s;
    }

    .no-btn {
      position: absolute;
      transition: all 0.2s ease;
      border: none;
      background: none;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
    }

    .music-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 8px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      cursor: pointer;
      z-index: 100;
    }
  </style>
</head>
<body>

  <button class="music-toggle" id="musicBtn">♫ Music Off</button>

  <div class="envelope">
    <div class="card" id="mainCard">
      <span class="heart-icon">❦</span>
      
      <div id="initialContent">
        <h1>Chère Joy...</h1>
        <p class="message">
          Some moments are meant to be captured in gold.<br>
          I have a small secret waiting for you.
        </p>
        <button class="btn-reveal" id="revealBtn">Ouvrir</button>
      </div>

      <div id="extraContent">
        <p class="message" id="quoteText">
          "Your smile is the most beautiful melody I've ever heard."
        </p>
        <div style="margin-top: 2rem;">
          <p style="font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 1rem; opacity: 0.6;">
            VOUS ÊTES MAGNIFIQUE?
          </p>
          <button class="btn-reveal" id="yesBtn" style="margin-right: 10px;">OUI</button>
          <button class="no-btn" id="noBtn">Non</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">Une pensée pour toi...</div>

  <audio id="audio" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/02/02/audio_c8c8c8c8c8.mp3" type="audio/mpeg">
  </audio>

  <script>
    const quotes = [
      "Joy, you make the world feel like a French poem.",
      "The stars look a little less bright when you laugh.",
      "In a room full of art, I'd still stare at you.",
      "Tu es mon plus beau voyage, Joy."
    ];

    const revealBtn = document.getElementById('revealBtn');
    const initialContent = document.getElementById('initialContent');
    const extraContent = document.getElementById('extraContent');
    const noBtn = document.getElementById('noBtn');
    const yesBtn = document.getElementById('yesBtn');
    const toast = document.getElementById('toast');
    const audio = document.getElementById('audio');
    const musicBtn = document.getElementById('musicBtn');

    // --- Interaction Logic ---
    
    revealBtn.addEventListener('click', () => {
      initialContent.style.display = 'none';
      extraContent.style.display = 'block';
      audio.play();
      musicBtn.innerText = "♫ Music On";
      showToast("Bienvenue dans ton petit coin de bonheur.");
    });

    yesBtn.addEventListener('click', () => {
      const nextQuote = quotes[Math.floor(Math.random() * quotes.length)];
      document.getElementById('quoteText').innerText = nextQuote;
      showToast("Je savais que tu dirais oui. ❤️");
    });

    noBtn.addEventListener('mouseover', () => {
      const x = Math.random() * 200 - 100;
      const y = Math.random() * 200 - 100;
      noBtn.style.transform = `translate(${x}px, ${y}px)`;
    });

    musicBtn.addEventListener('click', () => {
      if (audio.paused) {
        audio.play();
        musicBtn.innerText = "♫ Music On";
      } else {
        audio.pause();
        musicBtn.innerText = "♫ Music Off";
      }
    });

    function showToast(msg) {
      toast.innerText = msg;
      toast.style.opacity = 1;
      setTimeout(() => toast.style.opacity = 0, 4000);
    }

    // --- Create Ambient Dust Particles ---
    for (let i = 0; i < 50; i++) {
      const particle = document.createElement('div');
      particle.className = 'dust-particle';
      particle.style.left = Math.random() * 100 + 'vw';
      particle.style.top = Math.random() * 100 + 'vh';
      particle.style.width = particle.style.height = Math.random() * 3 + 'px';
      particle.style.animationDuration = Math.random() * 5 + 5 + 's';
      particle.style.animationDelay = Math.random() * 5 + 's';
      document.body.appendChild(particle);
    }
  </script>
</body>
  </html>
